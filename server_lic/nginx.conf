# Nginx configuration for License Server
# Place this in /etc/nginx/sites-available/license-server

upstream license_server {
    server 127.0.0.1:10001;
}

server {
    listen 80;
    listen [::]:80;
    server_name license.example.com;

    # Redirect to HTTPS
    return 301 https://$server_name$request_uri\;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name license.example.com;

    # SSL certificates (use certbot to generate)
    ssl_certificate /etc/letsencrypt/live/license.example.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/license.example.com/privkey.pem;

    # SSL configuration
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    # Logging
    access_log /var/log/nginx/license-server-access.log;
    error_log /var/log/nginx/license-server-error.log;

    # Rate limiting
    limit_req_zone $binary_remote_addr zone=license_limit:10m rate=10r/s;
    limit_req zone=license_limit burst=20 nodelay;

    # Allow large package uploads/downloads (OTA tarballs)
    client_max_body_size 256m;

    location / {
        proxy_pass http://license_server\;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Timeouts
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # OTA package downloads — proxy to Flask (which enforces license headers)
    location /downloads/ {
        proxy_pass http://license_server\;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # Larger timeouts for slow router downloads
        proxy_connect_timeout 60s;
        proxy_send_timeout 300s;
        proxy_read_timeout 300s;
        proxy_buffering off;
    }

    # Health check endpoint
    location /health {
        proxy_pass http://license_server/health\;
        access_log off;
    }
}
